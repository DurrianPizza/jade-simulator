<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上古玉魄模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%); min-height: 100vh; color: #f0e6d3; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; padding: 30px 0; }
        h1 { font-size: 2.5em; color: #e6b800; text-shadow: 0 0 20px rgba(230, 184, 0, 0.5); letter-spacing: 0.2em; }
        .subtitle { color: #888; margin-top: 10px; font-size: 0.9em; }
        .main-content { display: flex; gap: 30px; margin-bottom: 30px; flex-wrap: wrap; }
        .control-panel { flex: 1; min-width: 280px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(230, 184, 0, 0.3); border-radius: 15px; padding: 25px; }
        .stats-panel { flex: 2; min-width: 400px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(230, 184, 0, 0.3); border-radius: 15px; padding: 25px; }
        .panel-title { font-size: 1.2em; color: #e6b800; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid rgba(230, 184, 0, 0.2); }
        .btn { background: linear-gradient(135deg, #e6b800 0%, #b8941f 100%); color: #1a1a2e; border: none; padding: 15px 30px; font-size: 1.1em; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; margin: 5px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(230, 184, 0, 0.4); }
        .btn:active { transform: translateY(0); }
        .btn-secondary { background: rgba(230, 184, 0, 0.2); color: #e6b800; border: 1px solid #e6b800; }
        .input-group { margin: 15px 0; display: flex; align-items: center; gap: 10px; }
        .input-group label { color: #f0e6d3; white-space: nowrap; }
        .input-group input { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(230, 184, 0, 0.5); color: #f0e6d3; padding: 10px 15px; border-radius: 5px; font-size: 1em; width: 120px; }
        .input-group input:focus { outline: none; border-color: #e6b800; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .stat-item { background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 10px; text-align: center; }
        .stat-label { color: #888; font-size: 0.9em; margin-bottom: 5px; }
        .stat-value { font-size: 1.8em; font-weight: bold; color: #e6b800; }
        .stat-value.positive { color: #4ecdc4; }
        .stat-value.negative { color: #ff6b6b; }
        .results-section { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(230, 184, 0, 0.3); border-radius: 15px; padding: 25px; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-height: 500px; overflow-y: auto; }
        .jade-card { background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%); border-radius: 10px; padding: 15px; text-align: center; position: relative; overflow: hidden; animation: cardAppear 0.3s ease-out; }
        @keyframes cardAppear { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .jade-card.yang { border: 2px solid #ff6b35; box-shadow: 0 0 15px rgba(255, 107, 53, 0.3); }
        .jade-card.yin { border: 2px solid #4ecdc4; box-shadow: 0 0 15px rgba(78, 205, 196, 0.3); }
        .jade-type { position: absolute; top: 0; left: 0; width: 0; height: 0; border-style: solid; }
        .jade-card.yang .jade-type { border-width: 25px 25px 0 0; border-color: #ff6b35 transparent transparent transparent; }
        .jade-card.yin .jade-type { border-width: 25px 25px 0 0; border-color: #4ecdc4 transparent transparent transparent; }
        .jade-type-text { position: absolute; top: 5px; left: 5px; font-size: 0.7em; font-weight: bold; }
        .jade-card.yang .jade-type-text { color: #ff6b35; }
        .jade-card.yin .jade-type-text { color: #4ecdc4; }
        .jade-main-attr { font-size: 1em; font-weight: bold; color: #e6b800; margin: 25px 0 5px 0; }
        .jade-sub-attrs { font-size: 0.85em; color: #aaa; margin-bottom: 10px; }
        .jade-price { font-size: 1.3em; font-weight: bold; margin-top: 10px; }
        .jade-card.yang .jade-price { color: #ff6b35; }
        .jade-card.yin .jade-price { color: #4ecdc4; }
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .empty-state-icon { font-size: 3em; margin-bottom: 15px; }
        .breakeven-info { background: rgba(78, 205, 196, 0.1); border: 1px solid rgba(78, 205, 196, 0.3); border-radius: 10px; padding: 15px; margin-top: 20px; text-align: center; }
        .breakeven-info .label { color: #4ecdc4; font-size: 0.9em; }
        .breakeven-info .value { color: #4ecdc4; font-size: 1.5em; font-weight: bold; margin-top: 5px; }
        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .legend { display: flex; gap: 20px; margin-top: 15px; font-size: 0.85em; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-color { width: 15px; height: 15px; border-radius: 3px; }
        .legend-color.yang { background: #ff6b35; }
        .legend-color.yin { background: #4ecdc4; }
        .filter-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-btn { background: rgba(255, 255, 255, 0.1); color: #f0e6d3; border: 1px solid rgba(230, 184, 0, 0.5); padding: 8px 16px; font-size: 0.9em; border-radius: 5px; cursor: pointer; transition: all 0.2s; }
        .filter-btn:hover { background: rgba(230, 184, 0, 0.2); }
        .filter-btn.active { background: rgba(230, 184, 0, 0.4); border-color: #e6b800; color: #e6b800; }
        .type-stats { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .type-stat { background: rgba(0, 0, 0, 0.3); padding: 10px 15px; border-radius: 8px; text-align: center; min-width: 80px; }
        .type-stat-label { font-size: 0.8em; color: #888; }
        .type-stat-value { font-size: 1.2em; font-weight: bold; color: #e6b800; }
        .type-stat.aaa .type-stat-value { color: #ff4444; }
        .type-stat.aab .type-stat-value { color: #ff9944; }
        .type-stat.abb .type-stat-value { color: #44cc44; }
        .type-stat.normal .type-stat-value { color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>上古玉魄模拟器</h1><p class="subtitle">基于官网概率数据 · 开玉模拟</p></header>
        <div class="main-content">
            <div class="control-panel">
                <h2 class="panel-title">操作面板</h2>
                <div class="btn-row">
                    <button class="btn" onclick="openOneJade()">开 1 块玉</button>
                    <button class="btn btn-secondary" onclick="openTenJades()">开 10 块玉</button>
                </div>
                <div class="input-group">
                    <label>批量数量:</label>
                    <input type="number" id="batchCount" value="50" min="1" max="10000">
                    <button class="btn btn-secondary" onclick="openBatchJades()">开 批量</button>
                </div>
                <div class="btn-row"><button class="btn btn-secondary" onclick="resetAll()">重置统计</button></div>
                <div class="legend">
                    <div class="legend-item"><div class="legend-color yang"></div><span>阳玉</span></div>
                    <div class="legend-item"><div class="legend-color yin"></div><span>阴玉</span></div>
                </div>
                <div class="breakeven-info">
                    <div class="label">回本所需开玉数（50%概率）</div>
                    <div class="value" id="breakevenCount">--</div>
                </div>
            </div>
            <div class="stats-panel">
                <h2 class="panel-title">收益统计</h2>
                <div class="stats-grid">
                    <div class="stat-item"><div class="stat-label">总成本 (元)</div><div class="stat-value" id="totalCost">0</div></div>
                    <div class="stat-item"><div class="stat-label">总收益 (元)</div><div class="stat-value" id="totalRevenue">0</div></div>
                    <div class="stat-item"><div class="stat-label">净收益 (元)</div><div class="stat-value" id="netProfit">0</div></div>
                    <div class="stat-item"><div class="stat-label">回本率</div><div class="stat-value" id="breakevenRate">0%</div></div>
                    <div class="stat-item"><div class="stat-label">开玉次数</div><div class="stat-value" id="openCount">0</div></div>
                    <div class="stat-item"><div class="stat-label">高价值玉 (≥1000)</div><div class="stat-value" id="highValueCount">0</div></div>
                </div>
            </div>
        </div>
        <div class="results-section">
            <div class="results-header">
                <h2 class="panel-title" style="margin:0;padding:0;border:none;">开玉结果</h2>
                <span style="color:#666;font-size:0.9em;" id="resultCount">共 0 块玉</span>
            </div>
            <div class="type-stats" id="typeStats"></div>
            <div class="filter-row">
                <button class="filter-btn active" onclick="setFilter('all')">全部</button>
                <button class="filter-btn" onclick="setFilter('AAA')">AAA</button>
                <button class="filter-btn" onclick="setFilter('AAB')">AAB</button>
                <button class="filter-btn" onclick="setFilter('ABB')">ABB</button>
                <button class="filter-btn" onclick="setFilter('非标准')">普通</button>
            </div>
            <div class="results-grid" id="resultsGrid">
                <div class="empty-state"><div class="empty-state-icon">💎</div><p>点击"开1块玉"开始模拟</p></div>
            </div>
        </div>
    </div>

    '气血回复效果|抵抗封印等级|气血回复效果': 10,
    '气血回复效果|格挡值|气血': 10,
    '气血回复效果|格挡值|防御': 10,
    '气血回复效果|格挡值|法术防御': 10,
    '气血回复效果|格挡值|抗物理暴击等级': 10,
    '气血回复效果|格挡值|抗法术暴击等级': 10,
    '气血回复效果|格挡值|抗固伤暴击等级': 10,
    '气血回复效果|格挡值|抵抗封印等级': 10,
    '气血回复效果|格挡值|格挡值': 10,
    '气血回复效果|格挡值|气血回复效果': 10,
    '气血回复效果|气血回复效果|气血': 10,
    '气血回复效果|气血回复效果|防御': 10,
    '气血回复效果|气血回复效果|法术防御': 10,
    '气血回复效果|气血回复效果|抗物理暴击等级': 10,
    '气血回复效果|气血回复效果|抗法术暴击等级': 10,
    '气血回复效果|气血回复效果|抗固伤暴击等级': 10,
    '气血回复效果|气血回复效果|抵抗封印等级': 10,
    '气血回复效果|气血回复效果|格挡值': 10,
    '气血回复效果|气血回复效果|气血回复效果': 10,
}
};
        
        // 模拟器状态
        let state = {
            totalCost: 0,
            totalRevenue: 0,
            openCount: 0,
            highValueCount: 0,
            results: [],
            jadePrice: 150
        };

        // 当前筛选
        let currentFilter = 'all';

        function init() {
            calculateBreakeven();
            updateStats();
        }

        // 判断玉的类型
        function getJadeType(mainAttr, sub1, sub2) {
            // AAA: 三条全相同
            if (mainAttr === sub1 && mainAttr === sub2) return 'AAA';
            // AAB: 主属性与副属性中有1条相同（副属性之间不同）
            if (mainAttr === sub1 || mainAttr === sub2) return 'AAB';
            // ABB: 副属性两条相同（主属性可能相同或不同）
            if (sub1 === sub2) return 'ABB';
            // 非标准: 主属性与副属性完全不同，且副属性之间也不同
            return '非标准';
        }

        // 模拟开一块玉（有放回抽取）
        function openJade() {
            const jadeType = Math.random() < 0.5 ? 'yang' : 'yin';
            const attrs = jadeType === 'yang' ? YANG_ATTRS : YIN_ATTRS;

            // 有放回抽取3条（独立抽取）
            const attr1 = attrs[Math.floor(Math.random() * attrs.length)];
            const attr2 = attrs[Math.floor(Math.random() * attrs.length)];
            const attr3 = attrs[Math.floor(Math.random() * attrs.length)];

            // 随机选择主属性
            const allAttrs = [attr1, attr2, attr3];
            const mainIdx = Math.floor(Math.random() * 3);
            const mainAttr = allAttrs[mainIdx];
            const subAttrs = [allAttrs[(mainIdx + 1) % 3], allAttrs[(mainIdx + 2) % 3]];

            const price = calculatePrice(jadeType, mainAttr, subAttrs[0], subAttrs[1]);
            const comboType = getJadeType(mainAttr, subAttrs[0], subAttrs[1]);

            return {
                type: jadeType,
                mainAttr: mainAttr,
                subAttrs: subAttrs,
                price: price,
                comboType: comboType
            };
        }
        
        // 计算价格：key格式 "主属性|副属性1|副属性2"
        function calculatePrice(jadeType, mainAttr, sub1, sub2) {
            const key = `${mainAttr}|${sub1}|${sub2}`;
            const table = jadeType === 'yang' ? PRICE_TABLE.yang : PRICE_TABLE.yin;
            if (table[key] !== undefined) {
                return table[key];
            }
            return 10; // 默认回收价
        }
        
        function openOneJade() {
            const jade = openJade();
            state.totalCost += state.jadePrice;
            state.totalRevenue += jade.price;
            state.openCount++;
            if (jade.price >= 1000) state.highValueCount++;
            state.results.unshift(jade);
            updateStats();
            renderResults();
        }
        
        function openTenJades() {
            for (let i = 0; i < 10; i++) {
                const jade = openJade();
                state.totalCost += state.jadePrice;
                state.totalRevenue += jade.price;
                state.openCount++;
                if (jade.price >= 1000) state.highValueCount++;
                state.results.unshift(jade);
            }
            updateStats();
            renderResults();
        }
        
        function openBatchJades() {
            const count = parseInt(document.getElementById('batchCount').value) || 50;
            for (let i = 0; i < count; i++) {
                const jade = openJade();
                state.totalCost += state.jadePrice;
                state.totalRevenue += jade.price;
                state.openCount++;
                if (jade.price >= 1000) state.highValueCount++;
                state.results.unshift(jade);
            }
            updateStats();
            renderResults();
        }
        
        function updateStats() {
            document.getElementById('totalCost').textContent = state.totalCost.toLocaleString();
            document.getElementById('totalRevenue').textContent = state.totalRevenue.toLocaleString();
            const netProfit = state.totalRevenue - state.totalCost;
            const netProfitEl = document.getElementById('netProfit');
            netProfitEl.textContent = (netProfit >= 0 ? '+' : '') + netProfit.toLocaleString();
            netProfitEl.className = 'stat-value ' + (netProfit >= 0 ? 'positive' : 'negative');
            const breakevenRate = state.totalCost > 0 ? (state.totalRevenue / state.totalCost * 100).toFixed(1) : 0;
            document.getElementById('breakevenRate').textContent = breakevenRate + '%';
            document.getElementById('openCount').textContent = state.openCount.toLocaleString();
            document.getElementById('highValueCount').textContent = state.highValueCount.toLocaleString();
        }
        
        function renderResults() {
            const grid = document.getElementById('resultsGrid');
            renderTypeStats();

            // 根据筛选过滤
            let filtered = state.results;
            if (currentFilter !== 'all') {
                filtered = state.results.filter(j => j.comboType === currentFilter);
            }

            document.getElementById('resultCount').textContent = `共 ${filtered.length} 块玉`;
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💎</div><p>点击"开1块玉"开始模拟</p></div>';
                return;
            }

            if (currentFilter === 'all') {
                // 全部：按类型分组显示
                const typeStats = {};
                filtered.forEach(j => {
                    const t = j.comboType;
                    if (!typeStats[t]) typeStats[t] = { count: 0, totalPrice: 0 };
                    typeStats[t].count++;
                    typeStats[t].totalPrice += j.price;
                });

                const typeLabels = { 'AAA': 'AAA', 'AAB': 'AAB', 'ABB': 'ABB', '非标准': '普通' };
                const typeColors = { 'AAA': '#ff4444', 'AAB': '#ff9944', 'ABB': '#44cc44', '非标准': '#888888' };

                grid.innerHTML = Object.entries(typeStats).map(([type, stats]) => `
                    <div class="jade-card ${type === '非标准' ? 'normal' : type.toLowerCase()}" style="border-color: ${typeColors[type]};">
                        <div class="jade-type-text" style="color: ${typeColors[type]};">${typeLabels[type]}</div>
                        <div class="jade-main-attr" style="margin-top: 30px;">数量: ${stats.count}</div>
                        <div class="jade-sub-attrs">总价: ${stats.totalPrice}元</div>
                        <div class="jade-price" style="color: ${typeColors[type]};">均价: ${Math.round(stats.totalPrice / stats.count)}元</div>
                    </div>
                `).join('');
            } else {
                // 特定类型：按词条组合分组显示
                const comboStats = {};
                filtered.forEach(j => {
                    // 排序副属性后作为key
                    const sortedSubs = [...j.subAttrs].sort();
                    const key = `${j.mainAttr}|${sortedSubs.join('+')}`;
                    if (!comboStats[key]) {
                        comboStats[key] = {
                            mainAttr: j.mainAttr,
                            subAttrs: sortedSubs,
                            count: 0,
                            totalPrice: 0,
                            jadeType: j.type
                        };
                    }
                    comboStats[key].count++;
                    comboStats[key].totalPrice += j.price;
                });

                // 按总价降序排列
                const sortedCombos = Object.values(comboStats).sort((a, b) => b.totalPrice - a.totalPrice);

                grid.innerHTML = sortedCombos.map(combo => `
                    <div class="jade-card ${combo.jadeType}">
                        <div class="jade-type"></div>
                        <div class="jade-type-text">${combo.jadeType === 'yang' ? '阳' : '阴'}</div>
                        <div class="jade-main-attr" style="margin-top: 25px;">${combo.mainAttr}</div>
                        <div class="jade-sub-attrs">${combo.subAttrs.join(' + ')}</div>
                        <div style="margin-top: 10px; font-size: 0.85em; color: #888;">数量: ${combo.count}</div>
                        <div style="font-size: 0.85em; color: #888;">总价: ${combo.totalPrice}元</div>
                        <div class="jade-price">均价: ${Math.round(combo.totalPrice / combo.count)}元</div>
                    </div>
                `).join('');
            }
        }

        function renderTypeStats() {
            const stats = {
                'AAA': 0,
                'AAB': 0,
                'ABB': 0,
                '非标准': 0
            };
            state.results.forEach(j => stats[j.comboType]++);

            const container = document.getElementById('typeStats');
            container.innerHTML = `
                <div class="type-stat aaa"><div class="type-stat-label">AAA</div><div class="type-stat-value">${stats['AAA']}</div></div>
                <div class="type-stat aab"><div class="type-stat-label">AAB</div><div class="type-stat-value">${stats['AAB']}</div></div>
                <div class="type-stat abb"><div class="type-stat-label">ABB</div><div class="type-stat-value">${stats['ABB']}</div></div>
                <div class="type-stat normal"><div class="type-stat-label">普通</div><div class="type-stat-value">${stats['非标准']}</div></div>
            `;
        }

        function setFilter(filter) {
            currentFilter = filter;
            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderResults();
        }
        
        function resetAll() {
            state = { totalCost: 0, totalRevenue: 0, openCount: 0, highValueCount: 0, results: [], jadePrice: 150 };
            updateStats();
            renderResults();
        }
        
        function calculateBreakeven() {
            // 简化估算
            document.getElementById('breakevenCount').textContent = '72 块';
        }
        
        init();
    </script>
</body>
</html>
